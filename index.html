<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>silentov</title>
  <link rel="stylesheet" href="Assets/css/cursor.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
  <div class="panel">
    <img src="Assets/icons/logo.jpg" alt="logo" class="logo">
    <p class="name">silentovvv</p>
    <p class="quote">Life is what<br>happens while<br>you are busy<br>making other plans</p>
    <div class="social">
      <a href="https://t.me/silentovvv" target="_blank" class="social-link">
        <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
      </a>
    </div>
  </div>

  <div class="music-player">
    <button class="music-btn" id="musicBtn">
      <svg class="icon-play" viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
      <svg class="icon-pause" viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M3 5v14h5V5H3zm8 0v14h5V5h-5z"/></svg>
    </button>
    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
    <svg class="vol-icon" viewBox="0 0 24 24" width="18" height="18" fill="rgba(255,255,255,0.5)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zm2.5 0A7.5 7.5 0 0 0 14 5.5v2a5.5 5.5 0 0 1 0 9v2a7.5 7.5 0 0 0 5-6.5z"/></svg>
  </div>

  <audio id="bgMusic" loop autoplay src="Assets/musics/background.mp3"></audio>

  <script>
    const btn = document.getElementById('musicBtn');
    const audio = document.getElementById('bgMusic');
    const vol = document.getElementById('volumeSlider');
    audio.volume = vol.value;
    let playing = false;
    btn.addEventListener('click', () => {
      if (playing) {
        audio.pause();
        btn.classList.remove('playing');
      } else {
        audio.play();
        btn.classList.add('playing');
      }
      playing = !playing;
    });
    vol.addEventListener('input', () => {
      audio.volume = vol.value;
    });
  </script>
</body>
</html>
